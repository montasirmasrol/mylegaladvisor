{% extends 'base.html' %}

{% block title %}Login - MyLegalAdvisor{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-8 animate-slide-in">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Login</h2>
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-gray-700 font-semibold mb-2">Username</label>
          <input type="text" id="username" name="username" required 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
          <input type="password" id="password" name="password" required 
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white px-6 py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg">
                Login
            </button>
        </form>
        <p class="mt-6 text-center text-gray-600">
            Don't have an account? 
            <a href="{% url 'register' %}" class="text-indigo-600 hover:text-indigo-700 font-semibold">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
