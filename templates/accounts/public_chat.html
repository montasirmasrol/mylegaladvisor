{% extends 'base.html' %}

{% block title %}Public Chat - MyLegalAdvisor{% endblock %}

{% block content %}
<div id="chat-app" class="max-w-4xl mx-auto" data-room-id="{{ room.id|default:'' }}" data-username="{{ user.username|default:'' }}">
    <div class="bg-white rounded-2xl shadow-xl p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Public Chat</h1>
        <p class="text-gray-600 mb-4">Anyone can participate in this chat. Admin can see and respond to messages.</p>
        
        <div id="chat-container" class="bg-gray-50 rounded-lg p-4 h-96 overflow-y-auto mb-4 border border-gray-200">
            <!-- Messages are rendered by JS only (avoids duplicate rendering) -->
        </div>
        
        <form id="chat-form" class="flex gap-2">
            {% csrf_token %}
            <input type="text" id="message-input" placeholder="Type your message..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" required>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold transition-colors">Send</button>
        </form>
    </div>
</div>

<script>
    // Read values from data attributes to avoid embedding Django template tags inside JS
    const chatApp = document.getElementById('chat-app');
    const roomId = chatApp ? (chatApp.dataset.roomId || null) : null;
    const currentUsername = chatApp ? (chatApp.dataset.username || '') : '';
    let lastMessageId = 0; // start from zero and let JS load messages (prevents duplicate rendering)
    
    function addMessage(id, sender, message, time) {
        const container = document.getElementById('chat-container');
        if (document.getElementById('msg-' + id)) return;
        const div = document.createElement('div');
        div.id = 'msg-' + id;
        div.className = 'mb-3 p-3 bg-white rounded-lg shadow-sm animate-fade-in';
        div.innerHTML = `
            <div class="flex justify-between items-start mb-1">
                <strong class="text-indigo-600">${sender}</strong>
                <span class="text-xs text-gray-500">${time}</span>
            </div>
            <p class="text-gray-700">${message}</p>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function loadMessages() {
        if (!roomId) return;
        fetch(`/chat/messages/${roomId}/?last_id=${lastMessageId}`)
            .then(r => r.json())
            .then(data => {
                if (data.messages && data.messages.length > 0) {
                    if (lastMessageId === 0) document.getElementById('chat-container').innerHTML = '';
                    data.messages.forEach(msg => {
                        addMessage(msg.id, msg.sender, msg.message, msg.created_at.split(' ')[1]);
                        lastMessageId = Math.max(lastMessageId, msg.id);
                    });
                }
            })
            .catch(err => console.error('Error loading messages:', err));
    }
    
    document.getElementById('chat-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const message = document.getElementById('message-input').value.trim();
        const senderName = document.getElementById('sender-name') ? document.getElementById('sender-name').value.trim() : '';
        
        if (!message) return;
        
        if (!roomId) return;
        const formData = new FormData();
        formData.append('message', message);
        if (senderName) formData.append('sender_name', senderName);
        formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

        fetch('/public-chat/send/', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('message-input').value = '';
                if (document.getElementById('sender-name')) document.getElementById('sender-name').value = '';
                loadMessages();
            }
        })
        .catch(err => console.error('Error sending message:', err));
    });
    
    // Poll for new messages every 2 seconds
    setInterval(loadMessages, 2000);
    loadMessages();
</script>
{% endblock %}
