{% extends 'base.html' %}

{% block title %}Admin Profile - MyLegalAdvisor{% endblock %}

{% block content %}
<div class="card">
    <h2>Admin Profile</h2>
    <div style="margin-top: 2rem;">
        <h3 style="margin-bottom: 1rem; color: #3498db;">Administrator Information</h3>
        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ user.username }}" disabled style="background-color: #f5f5f5;">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" value="{{ user.email }}" disabled style="background-color: #f5f5f5;">
        </div>
        <div class="form-group">
            <label>User Type</label>
            <input type="text" value="Admin" disabled style="background-color: #f5f5f5;">
        </div>
        <p style="margin-top: 1rem; color: #666;">
            As an administrator, you can manage the system through the 
            <a href="{% url 'admin:index' %}" target="_blank">Django Admin Panel</a>.
        </p>
    </div>
</div>
{% endblock %}
